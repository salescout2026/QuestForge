name: Deploy Exact QuestForge Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy, example: v056"
        required: true
        default: "v056"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: questforge-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy exact release ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve exact release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail

          mkdir -p build

          echo "Deploying release tag: $RELEASE_TAG"
          echo "Repository: $GITHUB_REPOSITORY"

          gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets[].name' > build/assets.txt

          echo "Release assets:"
          cat build/assets.txt

          grep -E '^QuestForge_Current_v[0-9]+.*\.zip$' build/assets.txt > build/matching-assets.txt || true

          MATCH_COUNT="$(wc -l < build/matching-assets.txt | tr -d ' ')"

          if [ "$MATCH_COUNT" -eq 0 ]; then
            echo "ERROR: No playable QuestForge ZIP found for release $RELEASE_TAG."
            exit 1
          fi

          if [ "$MATCH_COUNT" -gt 1 ]; then
            echo "ERROR: More than one playable QuestForge ZIP found for release $RELEASE_TAG."
            cat build/matching-assets.txt
            exit 1
          fi

          ASSET_NAME="$(cat build/matching-assets.txt)"
          echo "Selected asset: $ASSET_NAME"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Download exact release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail

          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$ASSET_NAME" \
            --dir build \
            --clobber

          echo "Downloaded:"
          ls -lh build

      - name: Unpack build
        run: |
          set -euo pipefail

          rm -rf site
          mkdir -p site

          unzip -q "build/$ASSET_NAME" -d site

          if [ ! -f "site/index.html" ]; then
            echo "ERROR: Deployed ZIP does not contain index.html at the root."
            find site -maxdepth 3 -type f | sed -n '1,80p'
            exit 1
          fi

          echo "Confirmed site/index.html exists."
          echo "Preview of deployed files:"
          find site -maxdepth 2 -type f | sed -n '1,80p'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        run: |
          echo "Deployed release: ${{ github.event.inputs.release_tag }}"
          echo "Deployed asset: $ASSET_NAME"
          echo "URL: ${{ steps.deployment.outputs.page_url }}"
